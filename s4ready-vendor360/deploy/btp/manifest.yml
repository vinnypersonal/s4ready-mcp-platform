---
applications:
  - name: s4ready-vendor360
    memory: 512M
    disk_quota: 1G
    instances: 1
    buildpacks:
      - nodejs_buildpack
    command: node dist/server.js
    health-check-type: http
    health-check-http-endpoint: /health
    timeout: 60
    env:
      NODE_ENV: production
      DEPLOY_MODE: standalone
      SAP_MODE: mock
      SKIP_AUTH: "true"
      LOG_LEVEL: info
      DEFAULT_TENANT_ID: default
    services:
      - s4ready-vendor360-xsuaa
      - s4ready-vendor360-destination
      - s4ready-vendor360-connectivity
      - s4ready-vendor360-applogs
